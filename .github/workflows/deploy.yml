name: Build and Publish
# Docker Manager 가 push 감지 후 workflow_dispatch 로 빌드를 호출하므로,
# `push:` 자동 트리거를 제거해 1 push = 1 빌드 = 1 deploy 로 정리.
# 수동 빌드가 필요할 땐 GitHub Actions 화면에서 Run workflow.
on:
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          provenance: false
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
